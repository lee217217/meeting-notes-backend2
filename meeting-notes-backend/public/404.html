<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 — Page not found | AI Meeting Notes</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root { --brand:#16a34a; --bg:#f9fafb; --text:#111827; --muted:#6b7280; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0f172a; --text:#f1f5f9; --muted:#94a3b8; }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: grid; place-items: center;
    padding: 2rem; line-height: 1.5;
  }
  .wrap { text-align:center; max-width: 480px; }
  .code { font-size: clamp(4rem, 15vw, 7rem); font-weight: 800;
          color: var(--brand); line-height: 1; margin-bottom: 0.5rem; }
  h1 { font-size: clamp(1.25rem, 4vw, 1.75rem); margin-bottom: 0.75rem; }
  p { color: var(--muted); margin-bottom: 2rem; }
  .btns { display:flex; gap: 0.75rem; justify-content:center; flex-wrap:wrap; }
  .btn {
    padding: 0.75rem 1.5rem; border-radius: 8px;
    text-decoration: none; font-weight: 600;
    transition: transform 0.15s ease, background 0.15s ease;
    display: inline-block;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--brand); color: white; }
  .btn-primary:hover { background: #15803d; }
  .btn-secondary { background: transparent; color: var(--text);
                    border: 1px solid var(--muted); }
  .btn-secondary:hover { background: rgba(0,0,0,0.05); }
</style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for doesn't exist or has been moved.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">← Back to home</a>
      <a href="/pricing.html" class="btn btn-secondary">See pricing</a>
    </div>
  </main>
</body>
</html>
