<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page not found | Meeting Workspace</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root { --brand:#5b5bf5; --brand2:#8b5bf5; --bg:#f7f8fa; --text:#0a0a0b; --muted:#4a4a55; }
  @media (prefers-color-scheme: dark) { :root { --bg:#0b0b0f; --text:#f5f5f7; --muted:#c0c0cc; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: 'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text);
         min-height:100vh; display:grid; place-items:center; padding:2rem; line-height:1.5; }
  .wrap { text-align:center; max-width:480px; }
  .code { font-size:clamp(4rem,15vw,7rem); font-weight:800; line-height:1; margin-bottom:0.5rem;
          background:linear-gradient(135deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  h1 { font-size:clamp(1.25rem,4vw,1.75rem); margin-bottom:0.75rem; letter-spacing:-0.02em; }
  p { color:var(--muted); margin-bottom:2rem; }
  .btns { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; }
  .btn { padding:0.75rem 1.5rem; border-radius:10px; text-decoration:none; font-weight:600;
         transition:transform 0.15s; display:inline-block; }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:white;
                 box-shadow:0 8px 24px rgba(91,91,245,0.3); }
  .btn-secondary { background:transparent; color:var(--text); border:1px solid var(--muted); }
</style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">← Back to home</a>
      <a href="/pricing.html" class="btn btn-secondary">See pricing</a>
    </div>
  </main>
</body>
</html>
